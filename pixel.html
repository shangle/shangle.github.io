<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PixelForge - Animator & Editor</title>
    
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Intro.js for Tutorial -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intro.js/7.2.0/introjs.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/intro.js/7.2.0/intro.min.js"></script>

    <style>
        :root {
            --canvas-size: 512px;
            --bg-color: #111827;
            --panel-color: #1f2937;
        }

        body {
            background-color: var(--bg-color);
            color: #f3f4f6;
            overflow: hidden;
            touch-action: none; /* Prevent scroll on touch */
        }

        .canvas-container {
            width: var(--canvas-size);
            height: var(--canvas-size);
            position: relative;
            background-image: 
                linear-gradient(45deg, #374151 25%, transparent 25%), 
                linear-gradient(-45deg, #374151 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, #374151 75%), 
                linear-gradient(-45deg, transparent 75%, #374151 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            border: 1px solid #4b5563;
        }

        /* The grid overlay */
        .canvas-container::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                linear-gradient(to right, rgba(255,255,255,0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: calc(var(--canvas-size) / 32) calc(var(--canvas-size) / 32);
            pointer-events: none;
            z-index: 5;
            display: var(--show-grid, block);
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            image-rendering: -moz-crisp-edges;
            image-rendering: -webkit-crisp-edges;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            cursor: crosshair;
        }

        #mainCanvas { z-index: 10; }
        #overlayCanvas { z-index: 20; pointer-events: none; }
        
        .tool-btn {
            @apply flex flex-col items-center justify-center p-2 rounded-lg bg-gray-800 hover:bg-gray-700 transition-colors border border-transparent;
            aspect-ratio: 1;
        }

        .tool-btn.active {
            @apply bg-blue-600 border-blue-400 text-white shadow-lg shadow-blue-500/30;
        }

        .frame-thumb {
            @apply border-2 border-gray-600 rounded cursor-pointer bg-gray-800 transition-all flex-shrink-0 relative;
            width: 64px;
            height: 64px;
            image-rendering: pixelated;
        }
        
        .frame-thumb.active {
            @apply border-blue-500 transform scale-105 shadow-md shadow-blue-500/40;
        }

        .frame-thumb img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .frame-number {
            @apply absolute top-0 left-0 bg-black/60 text-xs px-1 rounded-br pointer-events-none;
        }

        /* Marching ants animation for selection */
        @keyframes marchingAnts {
            to { stroke-dashoffset: -10; }
        }
        .marching-ants {
            stroke-dasharray: 5, 5;
            animation: marchingAnts 0.5s linear infinite;
        }

        ::-webkit-scrollbar { height: 8px; width: 8px; }
        ::-webkit-scrollbar-track { background: #1f2937; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #6b7280; }
    </style>
</head>
<body class="flex flex-col h-screen font-sans antialiased text-sm">

    <!-- Top Navbar -->
    <header class="bg-gray-800 border-b border-gray-700 p-3 flex justify-between items-center shadow-md z-30">
        <div class="flex items-center gap-3">
            <div class="bg-blue-600 p-2 rounded-md text-white shadow-sm">
                <i class="fa-solid fa-cube text-lg"></i>
            </div>
            <h1 class="text-xl font-bold tracking-wider bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-emerald-400">PixelForge</h1>
        </div>
        
        <div class="flex items-center gap-4">
            <button id="toggleGridBtn" class="px-3 py-1.5 rounded bg-gray-700 hover:bg-gray-600 transition" title="Toggle Grid (G)">
                <i class="fa-solid fa-border-all"></i> Grid
            </button>
            <div class="h-6 w-px bg-gray-600"></div>
            <button onclick="exportSpriteSheet()" class="px-3 py-1.5 rounded bg-emerald-600 hover:bg-emerald-500 transition shadow-sm text-white font-medium" data-intro="Export all your frames as a single PNG Sprite Sheet.">
                <i class="fa-solid fa-file-image"></i> Export Sprite
            </button>
            <button onclick="exportVideo()" class="px-3 py-1.5 rounded bg-indigo-600 hover:bg-indigo-500 transition shadow-sm text-white font-medium" data-intro="Record and export your animation as a WebM video.">
                <i class="fa-solid fa-video"></i> Export Video
            </button>
            <button onclick="startTutorial()" class="w-8 h-8 rounded-full bg-gray-700 hover:bg-blue-500 transition flex items-center justify-center">
                <i class="fa-solid fa-question text-xs"></i>
            </button>
        </div>
    </header>

    <!-- Main Workspace -->
    <main class="flex-1 flex overflow-hidden">
        
        <!-- Left Toolbar -->
        <aside class="w-20 bg-gray-800 border-r border-gray-700 flex flex-col p-2 gap-2 overflow-y-auto z-20 shadow-xl" data-intro="Select your drawing, shaping, and selection tools here. Hover for keyboard shortcuts.">
            <!-- Tools -->
            <button class="tool-btn active" data-tool="pencil" title="Pencil (P)">
                <i class="fa-solid fa-pen"></i><span class="text-[10px] mt-1 opacity-70">Pen</span>
            </button>
            <button class="tool-btn" data-tool="eraser" title="Eraser (E)">
                <i class="fa-solid fa-eraser"></i><span class="text-[10px] mt-1 opacity-70">Erase</span>
            </button>
            <button class="tool-btn" data-tool="bucket" title="Paint Bucket (B)">
                <i class="fa-solid fa-fill-drip"></i><span class="text-[10px] mt-1 opacity-70">Fill</span>
            </button>
            <button class="tool-btn" data-tool="globalfill" title="Replace Color (S)">
                <i class="fa-solid fa-palette"></i><span class="text-[10px] mt-1 opacity-70">Replace</span>
            </button>
            
            <div class="h-px bg-gray-700 my-1"></div>
            
            <button class="tool-btn" data-tool="line" title="Line Tool (L) - Hold Shift to snap">
                <i class="fa-solid fa-minus"></i><span class="text-[10px] mt-1 opacity-70">Line</span>
            </button>
            <button class="tool-btn" data-tool="rect" title="Rectangle (R) - Hold Shift for square">
                <i class="fa-regular fa-square"></i><span class="text-[10px] mt-1 opacity-70">Rect</span>
            </button>
            <button class="tool-btn" data-tool="oval" title="Oval (O) - Hold Shift for circle">

            </button>
            
            <div class="h-px bg-gray-700 my-1"></div>

            <button class="tool-btn text-purple-400" data-tool="marquee" title="Rectangular Marquee (M)">
                <i class="fa-solid fa-vector-square"></i><span class="text-[10px] mt-1 opacity-70">Marquee</span>
            </button>
            <button class="tool-btn text-purple-400" data-tool="lasso" title="Lasso Selection (A)">
                <i class="fa-solid fa-lasso"></i><span class="text-[10px] mt-1 opacity-70">Lasso</span>
            </button>
        </aside>

        <!-- Center Canvas Area -->
        <section class="flex-1 bg-gray-900 flex items-center justify-center relative overflow-hidden" id="workspace">
            <div class="canvas-container" id="canvasContainer" data-intro="Draw here! Hold Shift with shape tools to constrain proportions. Use Ctrl+Z to Undo.">
                <canvas id="mainCanvas"></canvas>
                <canvas id="overlayCanvas"></canvas>
            </div>
            
            <!-- Playback HUD -->
            <div class="absolute top-4 right-4 bg-gray-800/80 backdrop-blur border border-gray-700 rounded-lg p-2 flex gap-2 shadow-lg z-20">
                <button id="playBtn" class="w-8 h-8 rounded bg-gray-700 hover:bg-emerald-600 transition flex items-center justify-center">
                    <i class="fa-solid fa-play"></i>
                </button>
                <div class="flex items-center gap-2 px-2 bg-gray-900 rounded border border-gray-700">
                    <span class="text-xs text-gray-400">FPS</span>
                    <input type="number" id="fpsInput" value="12" min="1" max="60" class="w-10 bg-transparent text-white outline-none text-center text-sm">
                </div>
            </div>
        </section>

        <!-- Right Properties Sidebar -->
        <aside class="w-56 bg-gray-800 border-l border-gray-700 p-4 flex flex-col gap-6 z-20 overflow-y-auto">
            <!-- Colors -->
            <div data-intro="Choose your drawing color here.">
                <h3 class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-3">Color</h3>
                <div class="flex gap-2 items-center mb-3">
                    <input type="color" id="colorPicker" value="#ffffff" class="w-12 h-12 rounded cursor-pointer bg-transparent border-0 p-0">
                    <div class="flex flex-col">
                        <span class="text-sm font-medium" id="colorHex">#FFFFFF</span>
                        <span class="text-xs text-gray-500">Primary</span>
                    </div>
                </div>
                <!-- Palette -->
                <div class="grid grid-cols-5 gap-1" id="palette">
                    <!-- JS populated -->
                </div>
            </div>

            <div class="h-px bg-gray-700"></div>

            <!-- Modifiers -->
            <div data-intro="Advanced tools: Mirroring for symmetry and Onion Skinning to see previous frames for animation.">
                <h3 class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-3">Modifiers</h3>
                
                <label class="flex items-center gap-3 mb-2 cursor-pointer group">
                    <div class="relative flex items-center">
                        <input type="checkbox" id="mirrorX" class="sr-only peer">
                        <div class="w-8 h-4 bg-gray-600 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:bg-blue-500 after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-3 after:w-3 after:transition-all"></div>
                    </div>
                    <span class="text-sm group-hover:text-blue-400 transition-colors"><i class="fa-solid fa-arrows-left-right w-5"></i> Mirror X</span>
                </label>

                <label class="flex items-center gap-3 mb-2 cursor-pointer group">
                    <div class="relative flex items-center">
                        <input type="checkbox" id="mirrorY" class="sr-only peer">
                        <div class="w-8 h-4 bg-gray-600 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:bg-blue-500 after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-3 after:w-3 after:transition-all"></div>
                    </div>
                    <span class="text-sm group-hover:text-blue-400 transition-colors"><i class="fa-solid fa-arrows-up-down w-5"></i> Mirror Y</span>
                </label>

                <label class="flex items-center gap-3 mt-4 cursor-pointer group">
                    <div class="relative flex items-center">
                        <input type="checkbox" id="onionSkin" class="sr-only peer" checked>
                        <div class="w-8 h-4 bg-gray-600 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:bg-emerald-500 after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-3 after:w-3 after:transition-all"></div>
                    </div>
                    <span class="text-sm group-hover:text-emerald-400 transition-colors"><i class="fa-solid fa-layer-group w-5"></i> Onion Skin</span>
                </label>
            </div>
            
            <div class="mt-auto pt-4 border-t border-gray-700 text-xs text-gray-500 leading-relaxed">
                <p><strong>Shortcuts:</strong></p>

                <p>N: New Frame</p>

                <p>Hold Shift: Constrain Shapes</p>
            </div>
        </aside>
    </main>

    <!-- Bottom Timeline -->
    <footer class="h-32 bg-gray-800 border-t border-gray-700 flex flex-col z-30 shadow-[0_-10px_20px_rgba(0,0,0,0.2)]">
        <div class="flex items-center justify-between px-4 py-2 border-b border-gray-700 bg-gray-900/50">
            <span class="text-xs font-bold text-gray-400 uppercase tracking-wider">Timeline / Frames</span>
            <div class="flex gap-2">
                <button id="addFrameBtn" class="px-3 py-1 rounded bg-blue-600 hover:bg-blue-500 text-xs transition shadow" title="New Frame (N)">
                    <i class="fa-solid fa-plus"></i> New
                </button>
                <button id="dupFrameBtn" class="px-3 py-1 rounded bg-indigo-600 hover:bg-indigo-500 text-xs transition shadow" title="Duplicate Current Frame (Shift+D)">
                    <i class="fa-solid fa-copy"></i> Duplicate
                </button>
                <button id="delFrameBtn" class="px-3 py-1 rounded bg-red-600 hover:bg-red-500 text-xs transition shadow" title="Delete Frame (Del)">

        </div>
        <div id="timeline" class="flex-1 flex items-center px-4 gap-3 overflow-x-auto" data-intro="Manage your animation frames here. Add, duplicate, delete, and click to switch frames.">
            <!-- Frames inserted via JS -->
        </div>
    </footer>

    <!-- Video Render Modal (Hidden) -->
    <div id="renderModal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 hidden flex-col items-center justify-center">
        <div class="bg-gray-800 p-8 rounded-xl shadow-2xl flex flex-col items-center text-center max-w-sm">
            <i class="fa-solid fa-spinner fa-spin text-4xl text-blue-500 mb-4"></i>
            <h2 class="text-xl font-bold mb-2">Rendering Video...</h2>
            <p class="text-gray-400 text-sm mb-4">Processing frames, please do not close the window.</p>
            <div class="w-full bg-gray-700 rounded-full h-2 mb-4">
                <div id="renderProgress" class="bg-blue-500 h-2 rounded-full w-0 transition-all duration-300"></div>
            </div>
        </div>
    </div>

    <!-- Application Script -->
    <script>
        // --- Configuration & Constants ---
        const RES = 32; // 32x32 pixel canvas internally
        const PALETTE = [
            '#000000', '#1a1c2c', '#5d275d', '#b13e53', '#ef7d57', '#ffcd75', '#a7f070', '#38b764',
            '#257179', '#29366f', '#3b5dc9', '#41a6f6', '#73eff7', '#f4f4f4', '#94b0c2', '#566c86', '#333c57'
        ];
        
        // --- State ---
        let state = {
            frames: [], // Array of objects: { id, data: ImageData }
            currentFrameIdx: 0,
            tool: 'pencil',
            color: { r: 255, g: 255, b: 255, a: 255 },
            hexColor: '#ffffff',
            isDrawing: false,
            mirrorX: false,
            mirrorY: false,
            onionSkin: true,
            isPlaying: false,
            fps: 12,
            playInterval: null,
            history: [], // Stack of ImageData for Undo
            selection: {
                active: false,
                isFloating: false,
                startX: 0, startY: 0,
                endX: 0, endY: 0,
                floatX: 0, floatY: 0,
                data: null, // ImageData of selected region
                path: [] // For lasso
            }
        };

        // UI Elements
        const dom = {
            container: document.getElementById('canvasContainer'),
            mainCanvas: document.getElementById('mainCanvas'),
            overlayCanvas: document.getElementById('overlayCanvas'),
            toolBtns: document.querySelectorAll('.tool-btn'),
            colorPicker: document.getElementById('colorPicker'),
            colorHex: document.getElementById('colorHex'),
            palette: document.getElementById('palette'),
            timeline: document.getElementById('timeline'),
            mirrorX: document.getElementById('mirrorX'),
            mirrorY: document.getElementById('mirrorY'),
            onionSkin: document.getElementById('onionSkin'),
            playBtn: document.getElementById('playBtn'),
            fpsInput: document.getElementById('fpsInput'),
            toggleGridBtn: document.getElementById('toggleGridBtn')
        };

        // Canvas Contexts
        const ctxMain = dom.mainCanvas.getContext('2d', { willReadFrequently: true });
        const ctxOverlay = dom.overlayCanvas.getContext('2d', { willReadFrequently: true });
        
        // --- Initialization ---
        function init() {
            // Setup internal resolution
            dom.mainCanvas.width = RES;
            dom.mainCanvas.height = RES;
            dom.overlayCanvas.width = RES;
            dom.overlayCanvas.height = RES;

            // Initialize palette
            PALETTE.forEach(c => {
                const btn = document.createElement('button');
                btn.className = 'w-8 h-8 rounded border border-gray-600 hover:scale-110 transition cursor-pointer';
                btn.style.backgroundColor = c;
                btn.onclick = () => setColor(c);
                dom.palette.appendChild(btn);
            });

            // Initialize first frame
            addNewFrame();
            saveHistory();

            // Setup Listeners
            setupEventListeners();
            
            // Check for tutorial
            if (!localStorage.getItem('pixelForgeTutorialSeen')) {
                setTimeout(startTutorial, 500);
            }
        }

        // --- Core Pixel Operations ---
        function hexToRgba(hex) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return { r, g, b, a: 255 };
        }

        function setColor(hex) {
            state.hexColor = hex;
            state.color = hexToRgba(hex);
            dom.colorPicker.value = hex;
            dom.colorHex.innerText = hex.toUpperCase();
        }

        function getPixel(imgData, x, y) {
            if (x < 0 || x >= RES || y < 0 || y >= RES) return null;
            const i = (y * RES + x) * 4;
            return {
                r: imgData.data[i],
                g: imgData.data[i+1],
                b: imgData.data[i+2],
                a: imgData.data[i+3]
            };
        }

        function setPixel(imgData, x, y, c) {
            if (x < 0 || x >= RES || y < 0 || y >= RES) return;
            const i = (y * RES + x) * 4;
            
            // Handle Eraser (alpha 0) or normal color
            if (state.tool === 'eraser' && c === state.color) {
                imgData.data[i] = 0; imgData.data[i+1] = 0; imgData.data[i+2] = 0; imgData.data[i+3] = 0;
            } else {
                // Simple alpha blending if target color has alpha (not implemented fully for transparency yet, assuming solid colors + clear)
                imgData.data[i] = c.r;
                imgData.data[i+1] = c.g;
                imgData.data[i+2] = c.b;
                imgData.data[i+3] = c.a;
            }
        }

        function drawPixelWithSymmetry(imgData, x, y, c) {
            setPixel(imgData, x, y, c);
            if (state.mirrorX) setPixel(imgData, RES - 1 - x, y, c);
            if (state.mirrorY) setPixel(imgData, x, RES - 1 - y, c);
            if (state.mirrorX && state.mirrorY) setPixel(imgData, RES - 1 - x, RES - 1 - y, c);
        }

        // --- Geometric Algorithms (No Anti-Aliasing) ---
        function bresenhamLine(imgData, x0, y0, x1, y1, c) {
            let dx = Math.abs(x1 - x0), sx = x0 < x1 ? 1 : -1;
            let dy = -Math.abs(y1 - y0), sy = y0 < y1 ? 1 : -1;
            let err = dx + dy, e2;

            while (true) {
                drawPixelWithSymmetry(imgData, x0, y0, c);
                if (x0 === x1 && y0 === y1) break;
                e2 = 2 * err;
                if (e2 >= dy) { err += dy; x0 += sx; }
                if (e2 <= dx) { err += dx; y0 += sy; }
            }
        }

        function drawRect(imgData, x0, y0, x1, y1, c) {
            const minX = Math.min(x0, x1), maxX = Math.max(x0, x1);
            const minY = Math.min(y0, y1), maxY = Math.max(y0, y1);
            for (let x = minX; x <= maxX; x++) {
                drawPixelWithSymmetry(imgData, x, minY, c);
                drawPixelWithSymmetry(imgData, x, maxY, c);
            }
            for (let y = minY; y <= maxY; y++) {
                drawPixelWithSymmetry(imgData, minX, y, c);
                drawPixelWithSymmetry(imgData, maxX, y, c);
            }
        }

        function drawEllipse(imgData, x0, y0, x1, y1, c) {
            // Midpoint ellipse algorithm
            let a = Math.abs(x1 - x0) / 2, b = Math.abs(y1 - y0) / 2;
            let xc = Math.min(x0, x1) + a, yc = Math.min(y0, y1) + b;
            
            // To keep things truly pixel perfect on small res, we approximate by sampling
            for (let y = -b; y <= b; y++) {
                for (let x = -a; x <= a; x++) {
                    // Equation of ellipse: (x/a)^2 + (y/b)^2 = 1. We look for edge pixels
                    let val = (x*x)/(a*a) + (y*y)/(b*b);
                    if (val >= 0.8 && val <= 1.2) { // Edge threshold approximation
                        drawPixelWithSymmetry(imgData, Math.round(xc + x), Math.round(yc + y), c);
                    }
                }
            }
        }

        function floodFill(imgData, startX, startY, targetColor) {
            const startNode = getPixel(imgData, startX, startY);
            if (!startNode) return;
            
            // If clicking on same color, do nothing
            if (startNode.r === targetColor.r && startNode.g === targetColor.g && 
                startNode.b === targetColor.b && startNode.a === targetColor.a) return;
            
            const matchStartColor = (p) => {
                if (!p) return false;
                return p.r === startNode.r && p.g === startNode.g && p.b === startNode.b && p.a === startNode.a;
            };

            const stack = [[startX, startY]];
            while (stack.length > 0) {
                const [x, y] = stack.pop();
                const p = getPixel(imgData, x, y);
                
                if (matchStartColor(p)) {
                    drawPixelWithSymmetry(imgData, x, y, targetColor);
                    if (x > 0) stack.push([x - 1, y]);
                    if (x < RES - 1) stack.push([x + 1, y]);
                    if (y > 0) stack.push([x, y - 1]);
                    if (y < RES - 1) stack.push([x, y + 1]);
                }
            }
        }

        function replaceColor(imgData, targetColor) {
            // Replaces all pixels of the clicked color with targetColor
            let clickedColor = null; // Needs context of where clicked, handled in mousedown
            // Implemented within mousedown handler directly
        }

        // --- Tools & Drawing Logic ---
        let startX, startY, lastX, lastY;
        let overlayImgData = null; // used to restore overlay before drawing shape preview

        function getMouseCoords(e) {
            const rect = dom.mainCanvas.getBoundingClientRect();
            // Map screen coords to internal 32x32 coords
            let x = Math.floor((e.clientX - rect.left) / (rect.width / RES));
            let y = Math.floor((e.clientY - rect.top) / (rect.height / RES));
            return { 
                x: Math.max(0, Math.min(RES - 1, x)), 
                y: Math.max(0, Math.min(RES - 1, y)) 
            };
        }

        function handleMouseDown(e) {
            if (state.isPlaying) return;
            
            const { x, y } = getMouseCoords(e);
            startX = x; startY = y;
            lastX = x; lastY = y;
            state.isDrawing = true;

            const imgData = getCurrentImageData();
            
            // Floating Selection logic
            if (state.selection.isFloating) {
                // Check if clicked inside floating selection bounds
                const inBounds = x >= state.selection.floatX && x < state.selection.floatX + state.selection.data.width &&
                                 y >= state.selection.floatY && y < state.selection.floatY + state.selection.data.height;
                
                if (inBounds && (state.tool === 'marquee' || state.tool === 'lasso')) {
                    // Start dragging floating selection
                    return; 
                } else {
                    commitSelection(); // Clicked outside, paste it
                    // Continue normal tool logic
                }
            }

            if (state.tool === 'pencil' || state.tool === 'eraser') {
                drawPixelWithSymmetry(imgData, x, y, state.color);
                putImageData(imgData);
            } 
            else if (state.tool === 'bucket') {
                floodFill(imgData, x, y, state.color);
                putImageData(imgData);
                state.isDrawing = false;
                saveHistory();
            }
            else if (state.tool === 'globalfill') {
                const clickedCol = getPixel(imgData, x, y);
                if (clickedCol) {
                    for(let i=0; i<RES*RES*4; i+=4) {
                        if(imgData.data[i] === clickedCol.r && imgData.data[i+1] === clickedCol.g && 
                           imgData.data[i+2] === clickedCol.b && imgData.data[i+3] === clickedCol.a) {
                            imgData.data[i] = state.color.r;
                            imgData.data[i+1] = state.color.g;
                            imgData.data[i+2] = state.color.b;
                            imgData.data[i+3] = state.color.a;
                        }
                    }
                    putImageData(imgData);
                }
                state.isDrawing = false;
                saveHistory();
            }
            else if (state.tool === 'marquee') {
                state.selection.active = true;
                state.selection.startX = x; state.selection.startY = y;
            }
            else if (state.tool === 'lasso') {
                state.selection.active = true;
                state.selection.path = [{x, y}];
            }
            
            overlayImgData = ctxOverlay.getImageData(0, 0, RES, RES);
            renderOverlay();
        }

        function handleMouseMove(e) {
            if (!state.isDrawing || state.isPlaying) return;
            
            let { x, y } = getMouseCoords(e);
            
            if (e.shiftKey && ['line', 'rect', 'oval', 'marquee'].includes(state.tool)) {
                // Constrain
                const dx = x - startX;
                const dy = y - startY;
                const max = Math.max(Math.abs(dx), Math.abs(dy));
                x = startX + Math.sign(dx) * max;
                y = startY + Math.sign(dy) * max;
            }

            // Dragging Floating Selection
            if (state.selection.isFloating && (state.tool === 'marquee' || state.tool === 'lasso')) {
                const dx = x - lastX;
                const dy = y - lastY;
                state.selection.floatX += dx;
                state.selection.floatY += dy;
                lastX = x; lastY = y;
                renderOverlay();
                return;
            }

            const imgData = getCurrentImageData();

            if (state.tool === 'pencil' || state.tool === 'eraser') {
                bresenhamLine(imgData, lastX, lastY, x, y, state.color);
                putImageData(imgData);
                lastX = x; lastY = y;
            } 
            else if (['line', 'rect', 'oval', 'marquee', 'lasso'].includes(state.tool)) {
                // Clear overlay and redraw preview
                ctxOverlay.clearRect(0, 0, RES, RES);
                // Redraw onion skin & floating selection if any
                renderOverlayBase(); 
                
                const previewData = ctxOverlay.getImageData(0, 0, RES, RES);
                
                if (state.tool === 'line') bresenhamLine(previewData, startX, startY, x, y, state.color);
                if (state.tool === 'rect') drawRect(previewData, startX, startY, x, y, state.color);
                if (state.tool === 'oval') drawEllipse(previewData, startX, startY, x, y, state.color);
                
                if (state.tool === 'marquee') {
                    // Draw dashed rect for marquee on overlay
                    ctxOverlay.putImageData(previewData, 0, 0);
                    ctxOverlay.strokeStyle = 'white';
                    ctxOverlay.setLineDash([2, 2]);
                    ctxOverlay.lineWidth = 1;
                    const w = x - startX; const h = y - startY;
                    ctxOverlay.strokeRect(startX + (w>0?0:1), startY + (h>0?0:1), Math.abs(w), Math.abs(h));
                    // Add inverse dashed rect for visibility
                    ctxOverlay.strokeStyle = 'black';
                    ctxOverlay.lineDashOffset = 2;
                    ctxOverlay.strokeRect(startX + (w>0?0:1), startY + (h>0?0:1), Math.abs(w), Math.abs(h));
                    ctxOverlay.setLineDash([]);
                    return; // skip putImageData for selection previews
                }

                if (state.tool === 'lasso') {
                    state.selection.path.push({x, y});
                    ctxOverlay.putImageData(previewData, 0, 0);
                    ctxOverlay.strokeStyle = 'white';
                    ctxOverlay.setLineDash([2, 2]);
                    ctxOverlay.beginPath();
                    ctxOverlay.moveTo(state.selection.path[0].x, state.selection.path[0].y);
                    state.selection.path.forEach(p => ctxOverlay.lineTo(p.x, p.y));
                    ctxOverlay.stroke();
                    return;
                }

                ctxOverlay.putImageData(previewData, 0, 0);
            }
        }

        function handleMouseUp(e) {
            if (!state.isDrawing || state.isPlaying) return;
            state.isDrawing = false;
            
            let { x, y } = getMouseCoords(e);
            
            if (e.shiftKey && ['line', 'rect', 'oval', 'marquee'].includes(state.tool)) {
                const dx = x - startX; const dy = y - startY;
                const max = Math.max(Math.abs(dx), Math.abs(dy));
                x = startX + Math.sign(dx) * max; y = startY + Math.sign(dy) * max;
            }

            if (state.selection.isFloating) {
                // Finished dragging selection. Keep it floating until clicked outside.
                return;
            }

            const imgData = getCurrentImageData();

            if (['line', 'rect', 'oval'].includes(state.tool)) {
                if (state.tool === 'line') bresenhamLine(imgData, startX, startY, x, y, state.color);
                if (state.tool === 'rect') drawRect(imgData, startX, startY, x, y, state.color);
                if (state.tool === 'oval') drawEllipse(imgData, startX, startY, x, y, state.color);
                putImageData(imgData);
                ctxOverlay.clearRect(0, 0, RES, RES);
                saveHistory();
            }
            else if (state.tool === 'pencil' || state.tool === 'eraser') {
                saveHistory();
            }
            else if (state.tool === 'marquee') {
                extractSelectionRect(startX, startY, x, y);
            }
            else if (state.tool === 'lasso') {
                extractSelectionLasso();
            }

            renderOverlay();
            updateThumbnails();
        }

        // --- Selection Logic ---
        function extractSelectionRect(x0, y0, x1, y1) {
            const minX = Math.min(x0, x1), maxX = Math.max(x0, x1);
            const minY = Math.min(y0, y1), maxY = Math.max(y0, y1);
            const w = maxX - minX + 1; const h = maxY - minY + 1;
            
            if (w <= 1 && h <= 1) { clearSelection(); return; } // Too small

            const mainData = getCurrentImageData();
            const selData = ctxMain.createImageData(w, h);
            
            // Copy pixels and erase from main
            for(let py=0; py<h; py++) {
                for(let px=0; px<w; px++) {
                    let mx = minX + px; let my = minY + py;
                    let mIdx = (my * RES + mx) * 4;
                    let sIdx = (py * w + px) * 4;
                    
                    selData.data[sIdx] = mainData.data[mIdx];
                    selData.data[sIdx+1] = mainData.data[mIdx+1];
                    selData.data[sIdx+2] = mainData.data[mIdx+2];
                    selData.data[sIdx+3] = mainData.data[mIdx+3];
                    
                    // Clear main
                    mainData.data[mIdx+3] = 0; 
                }
            }
            
            putImageData(mainData);
            
            state.selection = {
                active: true, isFloating: true,
                floatX: minX, floatY: minY,
                data: selData, path: []
            };
            saveHistory();
        }

        function extractSelectionLasso() {
            if(state.selection.path.length < 3) { clearSelection(); return; }
            
            // Create mask
            const maskCanvas = document.createElement('canvas');
            maskCanvas.width = RES; maskCanvas.height = RES;
            const mCtx = maskCanvas.getContext('2d');
            
            mCtx.beginPath();
            mCtx.moveTo(state.selection.path[0].x, state.selection.path[0].y);
            state.selection.path.forEach(p => mCtx.lineTo(p.x, p.y));
            mCtx.closePath();
            mCtx.fillStyle = 'white';
            mCtx.fill();
            
            const maskData = mCtx.getImageData(0,0,RES,RES);
            const mainData = getCurrentImageData();
            
            // Find bounds
            let minX=RES, minY=RES, maxX=0, maxY=0;
            state.selection.path.forEach(p => {
                minX = Math.min(minX, p.x); maxX = Math.max(maxX, p.x);
                minY = Math.min(minY, p.y); maxY = Math.max(maxY, p.y);
            });
            const w = maxX - minX + 1; const h = maxY - minY + 1;
            const selData = ctxMain.createImageData(w, h);

            for(let y=0; y<RES; y++) {
                for(let x=0; x<RES; x++) {
                    let idx = (y * RES + x) * 4;
                    if(maskData.data[idx+3] > 0) { // Inside lasso
                        // Copy to selData relative to bounds
                        let sIdx = ((y - minY) * w + (x - minX)) * 4;
                        selData.data[sIdx] = mainData.data[idx];
                        selData.data[sIdx+1] = mainData.data[idx+1];
                        selData.data[sIdx+2] = mainData.data[idx+2];
                        selData.data[sIdx+3] = mainData.data[idx+3];
                        
                        // Erase main
                        mainData.data[idx+3] = 0;
                    }
                }
            }

            putImageData(mainData);
            state.selection = {
                active: true, isFloating: true,
                floatX: minX, floatY: minY,
                data: selData, path: []
            };
            saveHistory();
        }

        function commitSelection() {
            if (!state.selection.isFloating) return;
            
            const mainData = getCurrentImageData();
            const sel = state.selection;
            
            for(let py=0; py<sel.data.height; py++) {
                for(let px=0; px<sel.data.width; px++) {
                    let mx = Math.floor(sel.floatX + px);
                    let my = Math.floor(sel.floatY + py);
                    
                    if(mx>=0 && mx<RES && my>=0 && my<RES) {
                        let sIdx = (py * sel.data.width + px) * 4;
                        if(sel.data.data[sIdx+3] > 0) { // If selection pixel is not transparent
                            let mIdx = (my * RES + mx) * 4;
                            mainData.data[mIdx] = sel.data.data[sIdx];
                            mainData.data[mIdx+1] = sel.data.data[sIdx+1];
                            mainData.data[mIdx+2] = sel.data.data[sIdx+2];
                            mainData.data[mIdx+3] = sel.data.data[sIdx+3];
                        }
                    }
                }
            }
            putImageData(mainData);
            clearSelection();
            saveHistory();
        }

        function clearSelection() {
            state.selection = { active: false, isFloating: false, data: null, path: [] };
            renderOverlay();
        }

        // --- Rendering & Canvas Sync ---
        function getCurrentImageData() {
            return ctxMain.getImageData(0, 0, RES, RES);
        }

        function putImageData(data) {
            ctxMain.putImageData(data, 0, 0);
            state.frames[state.currentFrameIdx].data = ctxMain.getImageData(0, 0, RES, RES);
            updateThumbnails();
        }

        function renderOverlayBase() {
            // Onion Skin
            if (state.onionSkin && state.currentFrameIdx > 0 && !state.isPlaying) {
                ctxOverlay.globalAlpha = 0.3;
                ctxOverlay.putImageData(state.frames[state.currentFrameIdx - 1].data, 0, 0); // Put ignores alpha, so we must draw image
                
                // Hack to draw ImageData with alpha
                createImageBitmap(state.frames[state.currentFrameIdx - 1].data).then(bmp => {
                    ctxOverlay.clearRect(0,0,RES,RES);
                    ctxOverlay.globalAlpha = 0.3;
                    ctxOverlay.drawImage(bmp, 0, 0);
                    ctxOverlay.globalAlpha = 1.0;
                    drawFloatingSelection();
                });
            } else {
                drawFloatingSelection();
            }
        }
        
        function drawFloatingSelection() {
            if (state.selection.isFloating && state.selection.data) {
                // Draw floating pixels
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = state.selection.data.width; tempCanvas.height = state.selection.data.height;
                tempCanvas.getContext('2d').putImageData(state.selection.data, 0, 0);
                ctxOverlay.drawImage(tempCanvas, state.selection.floatX, state.selection.floatY);
                
                // Draw bounding box
                ctxOverlay.strokeStyle = 'white';
                ctxOverlay.setLineDash([2, 2]);
                ctxOverlay.lineWidth = 1;
                ctxOverlay.strokeRect(state.selection.floatX, state.selection.floatY, state.selection.data.width, state.selection.data.height);
                ctxOverlay.strokeStyle = 'black';
                ctxOverlay.lineDashOffset = 2;
                ctxOverlay.strokeRect(state.selection.floatX, state.selection.floatY, state.selection.data.width, state.selection.data.height);
                ctxOverlay.setLineDash([]);
            }
        }

        function renderOverlay() {
            ctxOverlay.clearRect(0, 0, RES, RES);
            renderOverlayBase();
        }

        // --- Frame Management ---
        function addNewFrame(data = null) {
            commitSelection();
            const newId = Date.now();
            const newData = data ? new ImageData(new Uint8ClampedArray(data.data), RES, RES) : ctxMain.createImageData(RES, RES);
            
            state.frames.splice(state.currentFrameIdx + 1, 0, {
                id: newId,
                data: newData
            });
            
            state.currentFrameIdx++;
            if(state.frames.length === 1) state.currentFrameIdx = 0; // Fix initial add
            
            loadFrame(state.currentFrameIdx);
            renderTimelineUI();
        }

        function duplicateFrame() {
            addNewFrame(state.frames[state.currentFrameIdx].data);
        }

        function deleteFrame() {
            if (state.frames.length <= 1) {
                // Just clear it
                putImageData(ctxMain.createImageData(RES, RES));
                saveHistory();
                return;
            }
            commitSelection();
            state.frames.splice(state.currentFrameIdx, 1);
            if (state.currentFrameIdx >= state.frames.length) {
                state.currentFrameIdx = state.frames.length - 1;
            }
            loadFrame(state.currentFrameIdx);
            renderTimelineUI();
        }

        function loadFrame(idx) {
            state.currentFrameIdx = idx;
            ctxMain.putImageData(state.frames[idx].data, 0, 0);
            renderOverlay();
            updateThumbnails();
            
            // Update active styling in UI
            document.querySelectorAll('.frame-thumb').forEach((el, i) => {
                el.classList.toggle('active', i === idx);
            });
        }

        // --- Timeline UI ---
        function renderTimelineUI() {
            dom.timeline.innerHTML = '';
            state.frames.forEach((frame, idx) => {
                const thumb = document.createElement('div');
                thumb.className = `frame-thumb ${idx === state.currentFrameIdx ? 'active' : ''}`;
                thumb.onclick = () => loadFrame(idx);
                
                const num = document.createElement('div');
                num.className = 'frame-number';
                num.innerText = idx + 1;
                
                const img = document.createElement('img');
                img.id = `thumb-${frame.id}`;
                
                // Initial generation
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = RES; tempCanvas.height = RES;
                tempCanvas.getContext('2d').putImageData(frame.data, 0, 0);
                img.src = tempCanvas.toDataURL();

                thumb.appendChild(num);
                thumb.appendChild(img);
                dom.timeline.appendChild(thumb);
            });
            dom.timeline.scrollLeft = dom.timeline.scrollWidth;
        }

        function updateThumbnails() {
            if (!state.frames[state.currentFrameIdx]) return;
            const img = document.getElementById(`thumb-${state.frames[state.currentFrameIdx].id}`);
            if (img) {
                img.src = dom.mainCanvas.toDataURL();
            }
        }

        // --- History (Undo) ---
        function saveHistory() {
            state.history.push({
                frameIdx: state.currentFrameIdx,
                data: new ImageData(new Uint8ClampedArray(state.frames[state.currentFrameIdx].data.data), RES, RES)
            });
            if (state.history.length > 30) state.history.shift();
        }

        function undo() {
            if (state.history.length > 1) { // 1 is current state
                state.history.pop(); // Remove current
                const prev = state.history[state.history.length - 1];
                if (prev.frameIdx === state.currentFrameIdx) {
                    putImageData(new ImageData(new Uint8ClampedArray(prev.data.data), RES, RES));
                }
            }
        }

        // --- Playback ---
        function togglePlayback() {
            state.isPlaying = !state.isPlaying;
            commitSelection();
            if (state.isPlaying) {
                dom.playBtn.innerHTML = '<i class="fa-solid fa-pause"></i>';
                dom.playBtn.classList.add('bg-emerald-600', 'text-white');
                dom.playBtn.classList.remove('bg-gray-700');
                
                const interval = 1000 / state.fps;
                state.playInterval = setInterval(() => {
                    let nextIdx = (state.currentFrameIdx + 1) % state.frames.length;
                    loadFrame(nextIdx);
                }, interval);
            } else {
                dom.playBtn.innerHTML = '<i class="fa-solid fa-play"></i>';
                dom.playBtn.classList.remove('bg-emerald-600', 'text-white');
                dom.playBtn.classList.add('bg-gray-700');
                clearInterval(state.playInterval);
                renderOverlay(); // Restore onion skin
            }
        }

        // --- Event Listeners Setup ---
        function setupEventListeners() {
            // Mouse drawing
            dom.container.addEventListener('mousedown', handleMouseDown);
            window.addEventListener('mousemove', handleMouseMove); // Window to catch drags outside
            window.addEventListener('mouseup', handleMouseUp);
            
            // Tool selection
            dom.toolBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    commitSelection();
                    dom.toolBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    state.tool = btn.dataset.tool;
                    
                    // Cursor update
                    dom.mainCanvas.style.cursor = ['marquee', 'lasso'].includes(state.tool) ? 'crosshair' : 'default';
                });
            });

            // Color Picker
            dom.colorPicker.addEventListener('input', (e) => setColor(e.target.value));

            // Grid Toggle
            let gridVisible = true;
            dom.toggleGridBtn.addEventListener('click', () => {
                gridVisible = !gridVisible;
                document.documentElement.style.setProperty('--show-grid', gridVisible ? 'block' : 'none');
                dom.toggleGridBtn.classList.toggle('bg-gray-700');
                dom.toggleGridBtn.classList.toggle('bg-blue-600');
            });

            // Modifiers
            dom.mirrorX.addEventListener('change', (e) => state.mirrorX = e.target.checked);
            dom.mirrorY.addEventListener('change', (e) => state.mirrorY = e.target.checked);
            dom.onionSkin.addEventListener('change', (e) => {
                state.onionSkin = e.target.checked;
                renderOverlay();
            });

            // Frames
            document.getElementById('addFrameBtn').addEventListener('click', () => addNewFrame());
            document.getElementById('dupFrameBtn').addEventListener('click', duplicateFrame);
            document.getElementById('delFrameBtn').addEventListener('click', deleteFrame);

            // Playback
            dom.playBtn.addEventListener('click', togglePlayback);
            dom.fpsInput.addEventListener('change', (e) => {
                state.fps = Math.max(1, Math.min(60, parseInt(e.target.value) || 12));
                if (state.isPlaying) {
                    togglePlayback(); togglePlayback(); // Restart with new fps
                }
            });

            // Keyboard Shortcuts
            window.addEventListener('keydown', (e) => {
                if (e.target.tagName === 'INPUT') return; // Ignore if typing in an input
                
                const key = e.key.toLowerCase();
                
                // Tools
                const toolMap = {
                    'p': 'pencil', 'e': 'eraser', 'b': 'bucket', 's': 'globalfill',
                    'l': 'line', 'r': 'rect', 'o': 'oval', 'm': 'marquee', 'a': 'lasso'
                };
                if (toolMap[key]) {
                    document.querySelector(`[data-tool="${toolMap[key]}"]`).click();
                }

                // Grid
                if (key === 'g') dom.toggleGridBtn.click();
                
                // Frames
                if (key === 'n') addNewFrame();
                if (e.shiftKey && key === 'd') { e.preventDefault(); duplicateFrame(); }
                if (e.key === 'Delete' || e.key === 'Backspace') deleteFrame();
                
                // Undo
                if (e.ctrlKey && key === 'z') { e.preventDefault(); undo(); }
                
                // Selection Commit
                if (key === 'enter' || key === 'escape') commitSelection();
            });
        }

        // --- Export Functions ---
        function exportSpriteSheet() {
            commitSelection();
            const canvas = document.createElement('canvas');
            canvas.width = RES * state.frames.length;
            canvas.height = RES;
            const ctx = canvas.getContext('2d');
            
            // Draw all frames side by side
            state.frames.forEach((frame, i) => {
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = RES; tempCanvas.height = RES;
                tempCanvas.getContext('2d').putImageData(frame.data, 0, 0);
                ctx.drawImage(tempCanvas, i * RES, 0);
            });
            
            const link = document.createElement('a');
            link.download = `pixelforge-sprite-${Date.now()}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
        }

        async function exportVideo() {
            commitSelection();
            if (state.frames.length === 0) return;

            // Show render modal
            const modal = document.getElementById('renderModal');
            const progress = document.getElementById('renderProgress');
            modal.style.display = 'flex';
            progress.style.width = '0%';

            // Create a larger canvas for video rendering (e.g. 512x512)
            const renderCanvas = document.createElement('canvas');
            const scale = 16; // 32 * 16 = 512px
            renderCanvas.width = RES * scale;
            renderCanvas.height = RES * scale;
            const ctx = renderCanvas.getContext('2d');
            ctx.imageSmoothingEnabled = false;

            const stream = renderCanvas.captureStream(state.fps);
            const mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
            const chunks = [];
            
            mediaRecorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
            mediaRecorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/webm' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `pixelforge-anim-${Date.now()}.webm`;
                a.click();
                URL.revokeObjectURL(url);
                modal.style.display = 'none';
            };

            mediaRecorder.start();

            // Render loop pushing frames to the capture canvas
            const frameDuration = 1000 / state.fps;
            
            for (let i = 0; i < state.frames.length; i++) {
                // Draw upscaled
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = RES; tempCanvas.height = RES;
                tempCanvas.getContext('2d').putImageData(state.frames[i].data, 0, 0);
                
                ctx.fillStyle = document.documentElement.style.getPropertyValue('--bg-color') || '#111827';
                ctx.fillRect(0, 0, renderCanvas.width, renderCanvas.height);
                ctx.drawImage(tempCanvas, 0, 0, renderCanvas.width, renderCanvas.height);
                
                progress.style.width = `${((i + 1) / state.frames.length) * 100}%`;
                
                // Wait to ensure timing matches FPS
                await new Promise(r => setTimeout(r, frameDuration));
            }
            
            // Stop after last frame is drawn
            setTimeout(() => mediaRecorder.stop(), frameDuration);
        }

                        intro: "Manage your animation here. Hit <b>Shift+D</b> to duplicate your current frame quickly!",
                        position: 'top'
                    }
                ]
            }).start();
            localStorage.setItem('pixelForgeTutorialSeen', 'true');
        }

        // Start app
        window.onload = init;

    </script>
